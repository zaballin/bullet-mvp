name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: bullet-mvp

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: bullet-mvp/package-lock.json

      - name: Install dependencies
        working-directory: ./bullet-mvp
        run: npm ci

      - name: Build
        working-directory: ./bullet-mvp
        run: npm run build

      - name: Stop existing app
        run: pkill -f "next dev -p 3001" || true

      - name: Start app
        working-directory: ./bullet-mvp
        run: npm run dev &
        shell: bash
